name: Fork Android Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the APK to (e.g. v0.1.110)."
        required: true
        type: string
      checkout_ref:
        description: "Branch/ref containing the fork code to build."
        required: false
        default: "main"
        type: string
      publish:
        description: "Upload the APK to the GitHub release."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: fork-android-release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  SOURCE_TAG: ${{ inputs.tag }}
  CHECKOUT_REF: ${{ inputs.checkout_ref || 'main' }}
  SHOULD_PUBLISH: ${{ inputs.publish != 'false' }}
  PASEO_FORK_EAS_PROJECT_ID: ${{ vars.PASEO_FORK_EAS_PROJECT_ID }}
  PASEO_FORK_EAS_OWNER: ${{ vars.PASEO_FORK_EAS_OWNER }}

jobs:
  publish-android-apk:
    permissions:
      contents: write
      packages: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Resolve release metadata
        shell: bash
        run: |
          node scripts/emit-release-env.mjs --source-tag "$SOURCE_TAG" >> "$GITHUB_ENV"
          node scripts/emit-fork-build-env.mjs >> "$GITHUB_ENV"

      - name: Validate EAS configuration
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EXPO_TOKEN" || { echo "::error::EXPO_TOKEN secret is missing"; exit 1; }
          test -n "$PASEO_FORK_EAS_PROJECT_ID" || { echo "::error::PASEO_FORK_EAS_PROJECT_ID variable is missing"; exit 1; }
          test -n "$PASEO_FORK_EAS_OWNER" || { echo "::error::PASEO_FORK_EAS_OWNER variable is missing"; exit 1; }

      - name: Ensure GitHub release exists
        if: env.SHOULD_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="Paseo Fork v${FORK_DISPLAY_VERSION} (installer v${RELEASE_VERSION})"
          notes=$(printf 'Fork version: `v%s`\n\nInstaller version: `v%s`\n\nBased on official [getpaseo/paseo `v%s`](https://github.com/getpaseo/paseo/releases/tag/v%s).' \
            "$FORK_DISPLAY_VERSION" "$RELEASE_VERSION" "$FORK_UPSTREAM_BASE_VERSION" "$FORK_UPSTREAM_BASE_VERSION")
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --title "$title" --notes "$notes"
            exit 0
          fi
          args=(release create "$RELEASE_TAG" --repo "${{ github.repository }}" --title "$title" --notes "$notes" --draft)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}" || {
            gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null
            gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --title "$title" --notes "$notes"
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Prepare fork build metadata
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const version = process.env.RELEASE_VERSION;
          const projectId = process.env.PASEO_FORK_EAS_PROJECT_ID;
          const owner = process.env.PASEO_FORK_EAS_OWNER;
          if (!version || !projectId || !owner) throw new Error('Fork build metadata is incomplete');

          const forkGradleOpts = '-Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=768m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1';

          const packagePath = 'packages/app/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const easPath = 'packages/app/eas.json';
          const easJson = JSON.parse(fs.readFileSync(easPath, 'utf8'));
          const forkProfile = easJson.build['fork-apk'];
          Object.assign(forkProfile.env, {
            PASEO_FORK_EAS_PROJECT_ID: projectId,
            PASEO_FORK_EAS_OWNER: owner,
            GRADLE_OPTS: forkGradleOpts,
          });
          if (!forkProfile.android.gradleCommand.includes('--max-workers=')) {
            forkProfile.android.gradleCommand += ' --max-workers=1 --no-parallel';
          }
          fs.writeFileSync(easPath, `${JSON.stringify(easJson, null, 2)}\n`);
          NODE

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Prepare Android build capacity
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/share/dotnet
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          sdkmanager="$(find "$sdk_root/cmdline-tools" -type f -path '*/bin/sdkmanager' -print | sort -V | tail -1)"
          test -x "$sdkmanager"
          "$sdkmanager" --sdk_root="$sdk_root" "ndk;27.1.12297006"
          find "$sdk_root/ndk" -mindepth 1 -maxdepth 1 -type d ! -name 27.1.12297006 -exec sudo rm -rf {} +
          ndk_home="$sdk_root/ndk/27.1.12297006"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_NDK=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_home" >> "$GITHUB_ENV"
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h /

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and sign Android APK on GitHub
        id: artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          asset_name="Paseo-Fork-${RELEASE_VERSION}-android.apk"
          asset_path="$RUNNER_TEMP/$asset_name"
          cd packages/app
          eas build \
            --local \
            --platform android \
            --profile fork-apk \
            --non-interactive \
            --freeze-credentials \
            --output "$asset_path"
          test -s "$asset_path"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Verify signed APK
        shell: bash
        run: |
          set -euo pipefail
          apk="${{ steps.artifact.outputs.asset_path }}"
          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner -print | sort -V | tail -1)"
          aapt="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name aapt -print | sort -V | tail -1)"
          test -n "$apksigner"
          test -n "$aapt"
          "$apksigner" verify --verbose --print-certs "$apk"
          package_line="$("$aapt" dump badging "$apk" | sed -n '1p')"
          expected_version_code="$(node -e 'const [major, minor, patch] = process.argv[1].split(".").map(Number); process.stdout.write(String(major * 1000000 + minor * 1000 + patch));' "$RELEASE_VERSION")"
          echo "$package_line"
          grep -F "package: name='io.github.hamiltonhuaji.paseo' versionCode='$expected_version_code' versionName='$RELEASE_VERSION'" <<<"$package_line"

      - name: Upload APK to GitHub release
        if: env.SHOULD_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.artifact.outputs.asset_path }}" --clobber --repo "${{ github.repository }}"

      - name: Upload APK to workflow
        if: env.SHOULD_PUBLISH != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.asset_name }}
          path: ${{ steps.artifact.outputs.asset_path }}
          retention-days: 7
